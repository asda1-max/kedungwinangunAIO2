<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site_name or 'Website Desa' }}</title>
    <meta name="description" content="{{ page.title }} - {{ site_description or '' }}">
    <link rel="icon" href="{{ url_for('static', filename='images/kebumen.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'desa-dark': '#155C1B',
                        'desa-mid': '#2A6726',
                        'desa-light': '#73AA0F',
                        'desa-muted': '#5B8A4E',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f2; }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    {% include 'partials/navbar.html' %}

    <!-- HERO -->
    <div class="bg-[#0F5B21] px-6 py-10 md:px-[5%] md:py-16 text-white">
        <p class="text-xs md:text-sm text-green-300 mb-2">
            <a href="{{ url_for('public.index') }}" class="hover:underline">Beranda</a>
            <span class="mx-2">/</span>
            <span>{{ page.icon }} {{ page.title }}</span>
        </p>
        <h1 class="text-2xl md:text-4xl font-extrabold flex items-center gap-3">
            <span>{{ page.icon }}</span>
            {{ page.title }}
        </h1>
    </div>

    <!-- CONTENT -->
    <div class="px-6 py-10 md:px-[5%] md:py-14">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-10">
                {{ page.content|safe if page.content else '<p class="text-gray-500 italic">Konten belum tersedia.</p>' }}
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    {% include 'partials/footer.html' %}
</body>
</html>
