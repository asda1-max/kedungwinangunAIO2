<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman — {{ site_name or desa.nama }}</title>
    <meta name="description" content="Pengumuman penting dari Desa {{ desa.nama }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'desa-dark': '#155C1B', 'desa-mid': '#2A6726',
                        'desa-light': '#73AA0F', 'desa-muted': '#5B8A4E',
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <!-- NAVBAR -->
    {% include 'partials/navbar.html' %}

    <!-- PAGE HEADER - Minimalist -->
    <div class="bg-[#0F5B21] px-6 py-10 md:px-[5%] md:py-14 text-white">
        <p class="text-xs md:text-sm text-green-300 mb-2">
            <a href="{{ url_for('public.index') }}" class="hover:underline">Beranda</a> / Pengumuman
        </p>
        <h1 class="text-2xl md:text-4xl font-extrabold">Pengumuman</h1>
        <p class="text-sm md:text-base text-green-200 mt-1">Informasi penting dari Pemerintah Desa</p>
    </div>

    <!-- CONTENT - Minimalist -->
    <div class="container-lg mx-auto px-4 py-10" x-data="pengumumanPage()">
        <!-- Filter Tabs -->
        <div class="flex flex-wrap gap-2 mb-6">
            <button @click="filter = 'all'" :class="filter === 'all' ? 'bg-[#155C1B] text-white' : 'bg-white text-gray-600'"
                    class="px-4 py-2 rounded-lg text-sm font-medium transition-all border border-neutral-200">
                Semua
            </button>
            <button @click="filter = 'penting'" :class="filter === 'penting' ? 'bg-red-500 text-white' : 'bg-white text-gray-600'"
                    class="px-4 py-2 rounded-lg text-sm font-medium transition-all border border-neutral-200">
                Penting
            </button>
        </div>

        <!-- Announcement Cards -->
        <template x-for="ann in pengumuman.filter(a => filter === 'all' || (filter === 'penting' && a.is_penting == 1))" :key="ann.id">
            <div class="bg-white rounded-xl border border-neutral-200 shadow-sm mb-4 p-5"
                 :class="{ 'border-l-4 border-l-red-500': ann.is_penting == 1 }">
                <div class="flex flex-wrap items-start justify-between gap-3 mb-2">
                    <div class="flex flex-wrap items-center gap-2">
                        <span x-show="ann.is_penting == 1" class="px-2 py-0.5 rounded text-xs font-semibold bg-red-100 text-red-700">Penting</span>
                        <span class="text-xs text-gray-400" x-text="ann.tanggal"></span>
                    </div>
                </div>
                <h3 class="text-[#155C1B] font-bold mb-2" x-text="ann.judul"></h3>
                <p class="text-gray-600 text-sm" x-text="ann.isi"></p>
            </div>
        </template>

        <!-- Empty State -->
        <template x-if="pengumuman.length === 0">
            <div class="text-center py-16">
                <p class="text-gray-500">Belum ada pengumuman</p>
            </div>
        </template>
    </div>

    <!-- FOOTER -->
    {% include 'partials/footer.html' %}

    <script id="pengumuman-data" type="application/json">{{ pengumuman|tojson }}</script>
    <script>
        function pengumumanPage() {
            let pengumumanData = [];
            try {
                const raw = document.getElementById('pengumuman-data')?.textContent || '[]';
                pengumumanData = JSON.parse(raw);
            } catch (_) {
                pengumumanData = [];
            }

            return {
                filter: 'all',
                pengumuman: pengumumanData
            }
        }
    </script>
</body>
</html>
