{% extends 'admin/base.html' %}

{% block title %}Edit Struktur - Admin{% endblock %}
{% block page_title %}Edit Struktur Organisasi{% endblock %}
{% block page_subtitle %}Perbarui data struktur organisasi{% endblock %}

{% block content %}
<form method="POST">
    <div class="card-section animate-in">
        <div class="card-section-header">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
            </span>
            <div>
                <h2>Data Struktur</h2>
                <p>Perbarui form di bawah</p>
            </div>
        </div>
        <div class="card-section-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="kategori">Kategori <span class="required">*</span></label>
                    <select id="kategori" name="kategori" required>
                        <option value="pemerintah" {% if item.kategori == 'pemerintah' %}selected{% endif %}>Pemerintah Desa</option>
                        <option value="bpd" {% if item.kategori == 'bpd' %}selected{% endif %}>BPD (Badan Permusyawaratan Desa)</option>
                        <option value="rtrw" {% if item.kategori == 'rtrw' %}selected{% endif %}>RT & RW</option>
                        <option value="kader" {% if item.kategori == 'kader' %}selected{% endif %}>Kader & Lembaga Desa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nama">Nama Lengkap <span class="required">*</span></label>
                    <input type="text" id="nama" name="nama" value="{{ item.nama }}" placeholder="Contoh: Drs. H. Ahmad Zainuri" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="jabatan">Jabatan</label>
                    <input type="text" id="jabatan" name="jabatan" value="{{ item.jabatan or '' }}" placeholder="Contoh: Kepala Desa">
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <input type="text" id="status" name="status" value="{{ item.status or '' }}" placeholder="Contoh: PNS Desa">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="icon">Icon (Emoji)</label>
                    <input type="text" id="icon" name="icon" value="{{ item.icon or '' }}" placeholder="Contoh: 👤" maxlength="10">
                </div>
                <div class="form-group">
                    <label for="no_urut">No. Urut</label>
                    <input type="number" id="no_urut" name="no_urut" value="{{ item.no_urut or 0 }}" min="0">
                </div>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button type="submit" class="btn btn-primary">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
            </svg>
            Simpan Perubahan
        </button>
        <a href="{{ url_for('admin.struktur') }}" class="btn btn-outline">Batal</a>
    </div>
</form>
{% endblock %}
