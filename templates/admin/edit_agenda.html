{% extends "admin/base.html" %}

{% block title %}Edit Agenda - Admin Panel{% endblock %}

{% block content %}
<div class="p-6">
    <!-- Header -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-2">
            <a href="{{ url_for('admin.agenda') }}" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Edit Agenda</h1>
        </div>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <form method="POST" class="p-6 space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Judul Agenda <span class="text-red-500">*</span></label>
                    <input type="text" name="judul" required value="{{ item.judul }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal Mulai <span class="text-red-500">*</span></label>
                    <input type="date" name="tanggal_mulai" required value="{{ item.tanggal_mulai }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal Selesai</label>
                    <input type="date" name="tanggal_selesai" value="{{ item.tanggal_selesai or '' }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Waktu</label>
                    <input type="text" name="waktu" value="{{ item.waktu or '' }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Lokasi</label>
                    <input type="text" name="lokasi" value="{{ item.lokasi or '' }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                    <select name="kategori" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                        <option value="kegiatan" {% if item.kategori == 'kegiatan' %}selected{% endif %}>📌 Kegiatan</option>
                        <option value="rapat" {% if item.kategori == 'rapat' %}selected{% endif %}>🏛️ Rapat</option>
                        <option value="musyawarah" {% if item.kategori == 'musyawarah' %}selected{% endif %}>🤝 Musyawarah</option>
                        <option value="pembangunan" {% if item.kategori == 'pembangunan' %}selected{% endif %}>🏗️ Pembangunan</option>
                        <option value="kesehatan" {% if item.kategori == 'kesehatan' %}selected{% endif %}>🏥 Kesehatan</option>
                        <option value="pendidikan" {% if item.kategori == 'pendidikan' %}selected{% endif %}>📚 Pendidikan</option>
                        <option value="umum" {% if item.kategori == 'umum' %}selected{% endif %}>📋 Umum</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                        <option value="akan_datang" {% if item.status == 'akan_datang' %}selected{% endif %}>🟢 Akan Datang</option>
                        <option value="sedang_berlangsung" {% if item.status == 'sedang_berlangsung' %}selected{% endif %}>🟡 Sedang Berlangsung</option>
                        <option value="selesai" {% if item.status == 'selesai' %}selected{% endif %}>🔵 Selesai</option>
                        <option value="dibatalkan" {% if item.status == 'dibatalkan' %}selected{% endif %}>🔴 Dibatalkan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Icon</label>
                    <input type="text" name="icon" value="{{ item.icon or '📅' }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Penanggung Jawab</label>
                    <input type="text" name="penanggung_jawab" value="{{ item.penanggung_jawab or '' }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Urutan</label>
                    <input type="number" name="urutan" value="{{ item.urutan or 0 }}"
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div class="flex items-center">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="aktif" value="1" {% if item.aktif %}checked{% endif %}
                            class="w-5 h-5 text-green-600 rounded border-gray-300 focus:ring-green-600">
                        <span class="text-sm font-medium text-gray-700">Aktif / Tampilkan</span>
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Deskripsi</label>
                <textarea name="deskripsi" rows="4"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent resize-none">{{ item.deskripsi or '' }}</textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Peserta</label>
                <input type="text" name="peserta" value="{{ item.peserta or '' }}"
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
            </div>

            <div class="flex items-center gap-4 pt-4">
                <button type="submit" class="bg-green-700 text-white font-semibold py-2.5 px-6 rounded-lg hover:bg-green-800 transition-colors">
                    Update Agenda
                </button>
                <a href="{{ url_for('admin.agenda') }}" class="text-gray-600 hover:text-gray-800">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
