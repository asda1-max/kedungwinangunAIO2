{% extends "admin/base.html" %}

{% block title %}Tambah Agenda - Admin Panel{% endblock %}

{% block content %}
<div class="p-6">
    <!-- Header -->
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-2">
            <a href="{{ url_for('admin.agenda') }}" class="p-2 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </a>
            <h1 class="text-2xl font-bold text-gray-800">Tambah Agenda</h1>
        </div>
    </div>

    <!-- Form -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <form method="POST" class="p-6 space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
                <div class="md:col-span-2">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Judul Agenda <span class="text-red-500">*</span></label>
                    <input type="text" name="judul" required 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent"
                        placeholder="Nama kegiatan/agenda">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal Mulai <span class="text-red-500">*</span></label>
                    <input type="date" name="tanggal_mulai" required 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Tanggal Selesai</label>
                    <input type="date" name="tanggal_selesai" 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Waktu</label>
                    <input type="text" name="waktu" 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent"
                        placeholder="Contoh: 09.00 - 12.00 WIB">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Lokasi</label>
                    <input type="text" name="lokasi" 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent"
                        placeholder="Tempat kegiatan">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                    <select name="kategori" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                        <option value="kegiatan">📌 Kegiatan</option>
                        <option value="rapat">🏛️ Rapat</option>
                        <option value="musyawarah">🤝 Musyawarah</option>
                        <option value="pembangunan">🏗️ Pembangunan</option>
                        <option value="kesehatan">🏥 Kesehatan</option>
                        <option value="pendidikan">📚 Pendidikan</option>
                        <option value="umum">📋 Umum</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Status</label>
                    <select name="status" class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                        <option value="akan_datang">🟢 Akan Datang</option>
                        <option value="sedang_berlangsung">🟡 Sedang Berlangsung</option>
                        <option value="selesai">🔵 Selesai</option>
                        <option value="dibatalkan">🔴 Dibatalkan</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Icon</label>
                    <input type="text" name="icon" value="📅" 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Penanggung Jawab</label>
                    <input type="text" name="penanggung_jawab" 
                        class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent"
                        placeholder="Nama penanggung jawab">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Deskripsi</label>
                <textarea name="deskripsi" rows="4" 
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent resize-none"
                    placeholder="Deskripsi kegiatan"></textarea>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Peserta</label>
                <input type="text" name="peserta" 
                    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-600 focus:border-transparent"
                    placeholder="Target peserta">
            </div>

            <div class="flex items-center gap-4 pt-4">
                <button type="submit" class="bg-green-700 text-white font-semibold py-2.5 px-6 rounded-lg hover:bg-green-800 transition-colors">
                    Simpan Agenda
                </button>
                <a href="{{ url_for('admin.agenda') }}" class="text-gray-600 hover:text-gray-800">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
