<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name or 'Website Desa' }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}{{ site_description or '' }}{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='images/kebumen.png') }}">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'desa-dark': '#155C1B',
                        'desa-mid': '#2A6726',
                        'desa-light': '#73AA0F',
                        'desa-muted': '#5B8A4E',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f2;
            color: #1f2937;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Dark Theme Styles */
        .dark body,
        body.dark {
            background: #0f172a;
            color: #e2e8f0;
        }
        .dark .bg-white,
        body.dark .bg-white { background-color: #1e293b !important; }
        .dark .bg-\\[\\#f4f7f2\\],
        body.dark .bg-\\[\\#f4f7f2\\] { background-color: #0f172a !important; }
        .dark .bg-\\[\\#f0fdf4\\],
        body.dark .bg-\\[\\#f0fdf4\\] { background-color: #1e293b !important; }
        .dark .text-\\[\\#155C1B\\],
        body.dark .text-\\[\\#155C1B\\] { color: #86efac !important; }
        .dark .text-gray-500,
        body.dark .text-gray-500 { color: #94a3b8 !important; }
        .dark .text-gray-600,
        body.dark .text-gray-600 { color: #cbd5e1 !important; }
        .dark .text-gray-700,
        body.dark .text-gray-700 { color: #e2e8f0 !important; }
        .dark .text-gray-400,
        body.dark .text-gray-400 { color: #64748b !important; }
        .dark .border-gray-100,
        body.dark .border-gray-100 { border-color: #334155 !important; }
        .dark .border-\\[rgba\\(21\\,92\\,27\\,0\\.07\\)\\], body.dark .border-\\[rgba\\(21\\,92\\,27\\,0\\.07\\)\\] { border-color: #334155 !important; }
        .dark .bg-\\[\\#f0fdf4\\],
        body.dark .bg-\\[\\#f0fdf4\\] { background-color: #1e293b !important; }
        .dark .shadow-lg,
        body.dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5) !important; }
        .dark .shadow-md,
        body.dark .shadow-md { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5) !important; }
        .dark .shadow-sm,
        body.dark .shadow-sm { box-shadow: 0 1px 2px rgba(0,0,0,0.3) !important; }

        /* Line Clamp Utilities */
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        /* Scroll Reveal Animations */
        .reveal, .reveal-left, .reveal-right, .reveal-scale {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s cubic-bezier(0.5, 0, 0, 1), transform 0.8s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal-left { transform: translateX(-50px); }
        .reveal-right { transform: translateX(50px); }
        .reveal-scale { transform: scale(0.9); }
        .reveal.active, .reveal-left.active, .reveal-right.active, .reveal-scale.active {
            opacity: 1;
            transform: translate(0) scale(1);
        }
        .reveal-footer {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .reveal-footer.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Stagger Delays */
        .stagger-1 { transition-delay: 0.1s; }
        .stagger-2 { transition-delay: 0.2s; }
        .stagger-3 { transition-delay: 0.3s; }
        .stagger-4 { transition-delay: 0.4s; }
        .stagger-5 { transition-delay: 0.5s; }
        .stagger-6 { transition-delay: 0.6s; }

        /* Animated Underline */
        .animated-underline { position: relative; display: inline-block; }
        .animated-underline::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 4px;
            background: linear-gradient(90deg, #155C1B, #73AA0F);
            border-radius: 2px;
            transition: width 0.4s ease;
        }
        .animated-underline.active::after { width: 100%; }
        .dark .animated-underline::after { background: linear-gradient(90deg, #86efac, #73AA0F); }
        .dark .animated-underline { color: #86efac !important; }

        /* Card Glow Effect */
        .card-glow { transition: all 0.4s cubic-bezier(0.5, 0, 0, 1); }
        .card-glow:hover { box-shadow: 0 0 30px rgba(21, 92, 27, 0.2), 0 10px 40px rgba(21, 92, 27, 0.1); }

        /* Section Divider */
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #155C1B, #73AA0F, #155C1B, transparent);
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Fade In Animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 1s ease forwards; }

        /* Shine Effect */
        .shine-effect { position: relative; overflow: hidden; }
        .shine-effect::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }
        .shine-effect:hover::before { left: 100%; }

        /* Ripple Effect */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .ripple:active::after { width: 300px; height: 300px; }

        /* Float Animation */
        .float { animation: float 3s ease-in-out infinite; }
        .float-delay-1 { animation-delay: 0.5s; }
        .float-delay-2 { animation-delay: 1s; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Pulse Animation */
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Smooth Scroll */
        section { scroll-margin-top: 80px; }
        html { scroll-behavior: smooth; }

        /* Lightbox Styles */
        .lightbox {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.show {
            opacity: 1;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    {% include 'partials/navbar.html' %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'partials/footer.html' %}

    <!-- Lightbox Modal -->
    {% block lightbox %}
    <div id="lightbox" class="lightbox fixed inset-0 bg-black/90 z-[200] hidden items-center justify-center p-4" onclick="closeLightbox()">
        <button class="absolute top-4 right-4 text-white text-3xl hover:text-gray-300 transition-colors" onclick="closeLightbox()">×</button>
        <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[90vh] object-contain rounded-lg" onclick="event.stopPropagation()">
        <p id="lightbox-caption" class="absolute bottom-6 left-0 right-0 text-center text-white text-lg font-semibold"></p>
    </div>
    {% endblock %}

    <!-- Common Scripts -->
    <script>
        // ═══════════════════════════════════════════════════════════
        // DARK THEME TOGGLE
        // ═══════════════════════════════════════════════════════════
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        // Check saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
            document.body.classList.add('dark');
            if (sunIcon) sunIcon.classList.remove('hidden');
            if (moonIcon) moonIcon.classList.add('hidden');
        }

        // Toggle theme
        if (themeToggle) {
            themeToggle.addEventListener('click', function() {
                document.documentElement.classList.toggle('dark');
                document.body.classList.toggle('dark');

                const isDark = document.body.classList.contains('dark') || document.documentElement.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');

                if (sunIcon && moonIcon) {
                    sunIcon.classList.toggle('hidden', !isDark);
                    moonIcon.classList.toggle('hidden', isDark);
                }
            });
        }

        // ═══════════════════════════════════════════════════════════
        // MOBILE MENU
        // ═══════════════════════════════════════════════════════════
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // ═══════════════════════════════════════════════════════════
        // SCROLL REVEAL
        // ═══════════════════════════════════════════════════════════
        function reveal() {
            const elements = document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale, .reveal-footer, .animated-underline');
            const windowHeight = window.innerHeight;
            const revealPoint = 150;

            elements.forEach(function(el) {
                const elementTop = el.getBoundingClientRect().top;
                if (elementTop < windowHeight - revealPoint) {
                    el.classList.add('active');
                }
            });
        }

        window.addEventListener('scroll', reveal);
        window.addEventListener('load', reveal);

        // ═══════════════════════════════════════════════════════════
        // DATE & TIME (WIB)
        // ═══════════════════════════════════════════════════════════
        function updateDateTime() {
            const now = new Date();
            const wibOffset = 7 * 60;
            const localOffset = now.getTimezoneOffset();
            const wibTime = new Date(now.getTime() + (wibOffset + localOffset) * 60000);

            const dateOptions = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            const dateStr = wibTime.toLocaleDateString('id-ID', dateOptions);

            const hours = String(wibTime.getHours()).padStart(2, '0');
            const minutes = String(wibTime.getMinutes()).padStart(2, '0');
            const seconds = String(wibTime.getSeconds()).padStart(2, '0');
            const timeStr = hours + ':' + minutes + ':' + seconds;

            const dateEl = document.getElementById('current-date');
            const timeEl = document.getElementById('current-time');
            if (dateEl) dateEl.textContent = dateStr;
            if (timeEl) timeEl.textContent = timeStr;
        }

        updateDateTime();
        setInterval(updateDateTime, 1000);

        // ═══════════════════════════════════════════════════════════
        // LIGHTBOX
        // ═══════════════════════════════════════════════════════════
        window.openLightbox = function(imgSrc, caption) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const cap = document.getElementById('lightbox-caption');
            if (lightbox && img && cap) {
                img.src = imgSrc;
                cap.textContent = caption;
                lightbox.classList.remove('hidden');
                lightbox.classList.add('flex', 'show');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeLightbox = function() {
            const lightbox = document.getElementById('lightbox');
            if (lightbox) {
                lightbox.classList.remove('show');
                setTimeout(function() {
                    lightbox.classList.add('hidden');
                    lightbox.classList.remove('flex');
                    document.body.style.overflow = '';
                }, 300);
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
        });

        // ═══════════════════════════════════════════════════════════
        // SMOOTH SCROLL FOR ANCHOR LINKS
        // ═══════════════════════════════════════════════════════════
        document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
            anchor.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href');
                if (targetId === '#') return;
                const target = document.querySelector(targetId);
                if (target) {
                    e.preventDefault();
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
