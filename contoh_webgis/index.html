  function rtIcon() {
    return L.divIcon({
      html: '<div style="background:#457b9d;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,0.5)"></div>',
      className: '', iconSize: [12,12], iconAnchor: [6,6]
    });
  }
  function rwIcon() {
    return L.divIcon({
      html: '<div style="background:#264653;width:17px;height:17px;border-radius:3px;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,0.5)"></div>',
      className: '', iconSize: [17,17], iconAnchor: [8,8]
    });
  }

  // ---------- LAYER BATAS DESA (paling bawah) ----------
  const desaLayer = L.geoJSON(DESA_DATA, {
    style: { color: '#e76f51', weight: 3, fillColor: '#e76f51', fillOpacity: 0.08, dashArray: '6 4' },
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`
        <div class="popup-title">🗺️ Desa ${p.nama_desa}</div>
        <div class="popup-row"><b>Kecamatan:</b> ${p.kecamatan || '-'}</div>
        <div class="popup-row"><b>Kabupaten:</b> ${p.kabupaten || '-'}</div>
        <div class="popup-row"><b>Provinsi:</b> ${p.provinsi || '-'}</div>
        <div class="popup-row"><b>Luas:</b> ${p.luas_km2 ? p.luas_km2 + ' km²' : '-'}</div>
        <div class="popup-row"><b>Sumber:</b> ${p.sumber || '-'}</div>
      `);
    }
  }).addTo(map);

  // ---------- LAYER BATAS DUSUN / RW ----------
  const dusunColors = ['#7209b7', '#f3722c', '#43aa8b', '#577590', '#f94144', '#90be6d', '#277da1', '#f8961e'];
  const dusunLayer = L.geoJSON(DUSUN_DATA, {
    style: (feature) => {
      const idx = feature.properties.RW % dusunColors.length;
      const c = dusunColors[idx];
      return { color: c, weight: 2, fillColor: c, fillOpacity: 0.15 };
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      const luasHa = (p.Luas / 10000).toFixed(2);
      layer.bindPopup(`
        <div class="popup-title">📍 RW ${String(p.RW).padStart(2,'0')} - Dusun ${p.Dusun}</div>
        <div class="popup-row"><b>Nama Dusun:</b> ${p.Dusun}</div>
        <div class="popup-row"><b>Wilayah:</b> RW ${String(p.RW).padStart(2,'0')}</div>
        <div class="popup-row"><b>Luas:</b> ${luasHa} ha</div>
      `);
    }
  }).addTo(map);

  // Label permanen (nama dusun + RW) di tengah tiap wilayah
  const dusunLabelLayer = L.layerGroup();
  DUSUN_DATA.features.forEach(f => {
    const p = f.properties;
    const [lon, lat] = p.centroid;
    const label = L.marker([lat, lon], {
      icon: L.divIcon({
        className: '',
        html: `<div class="dusun-label"><span class="label-rw">RW ${String(p.RW).padStart(2,'0')}</span><span class="label-nama">Dusun ${p.Dusun}</span></div>`,
        iconSize: null,
        iconAnchor: [30, 15]
      }),
      interactive: false
    });
    dusunLabelLayer.addLayer(label);
  });
  dusunLabelLayer.addTo(map);

  // ---------- LAYER UMKM ----------
  const umkmLayer = L.geoJSON(UMKM_DATA, {
    pointToLayer: (feature, latlng) => L.marker(latlng, { icon: umkmIcon() }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      const coords = feature.geometry.coordinates;
      layer.bindPopup(`
        <div class="popup-title">🏪 ${p.nama_umkm}</div>
        <div class="popup-row"><b>Jenis Usaha:</b> ${p.jenis_usaha || '-'}</div>
        <div class="popup-row"><b>Kategori:</b> ${p.kategori || '-'}</div>
        <div class="popup-row"><b>Alamat:</b> ${p.alamat || '-'}</div>
        <div class="popup-row"><b>Pemilik:</b> ${p.pemilik || '-'}</div>
        <div class="popup-row"><b>Kontak:</b> ${p.no_hp || '-'}</div>
        <div class="popup-row"><b>Jam Operasional:</b> ${p.jam_operasional || '-'}</div>
        <div class="popup-row"><b>Koordinat:</b> ${coords[1].toFixed(6)}, ${coords[0].toFixed(6)}</div>
        ${p.deskripsi ? `<div class="popup-row">${p.deskripsi}</div>` : ''}
      `);
    }
  }).addTo(map);

  // ---------- LAYER RT & RW ----------
  const rtFeatures = { type: 'FeatureCollection', features: RTRW_DATA.features.filter(f => f.properties.jenis === 'RT') };
  const rwFeatures = { type: 'FeatureCollection', features: RTRW_DATA.features.filter(f => f.properties.jenis === 'RW') };

  const rtLayer = L.geoJSON(rtFeatures, {
    pointToLayer: (feature, latlng) => L.marker(latlng, { icon: rtIcon() }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`
        <div class="popup-title">🏠 Ketua ${p.wilayah}</div>
        <div class="popup-row"><b>Nama:</b> ${p.nama_ketua || '(belum ada data)'}</div>
        <div class="popup-row"><b>Jabatan:</b> ${p.jabatan}</div>
        <div class="popup-row"><b>Alamat:</b> ${p.alamat || '-'}</div>
        <div class="popup-row"><b>Kontak:</b> ${p.no_hp || '-'}</div>
      `);
    }
  }).addTo(map);

  const rwLayer = L.geoJSON(rwFeatures, {
    pointToLayer: (feature, latlng) => L.marker(latlng, { icon: rwIcon() }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties;
      layer.bindPopup(`
        <div class="popup-title">🏛️ Ketua ${p.wilayah}</div>
        <div class="popup-row"><b>Nama:</b> ${p.nama_ketua || '(belum ada data)'}</div>
        <div class="popup-row"><b>Jabatan:</b> ${p.jabatan}</div>
        <div class="popup-row"><b>Jumlah RT dibawahnya:</b> ${p.jumlah_rt || '-'}</div>
        <div class="popup-row"><b>Alamat:</b> ${p.alamat || '-'}</div>
        <div class="popup-row"><b>Kontak:</b> ${p.no_hp || '-'}</div>
      `);
    }
  }).addTo(map);

  // ---------- TOGGLE LAYER ----------
  document.getElementById('chk-desa').addEventListener('change', e => {
    e.target.checked ? map.addLayer(desaLayer) : map.removeLayer(desaLayer);
  });
  document.getElementById('chk-dusun').addEventListener('change', e => {
    if (e.target.checked) {
      map.addLayer(dusunLayer);
      map.addLayer(dusunLabelLayer);
    } else {
      map.removeLayer(dusunLayer);
      map.removeLayer(dusunLabelLayer);
    }
  });
  document.getElementById('chk-umkm').addEventListener('change', e => {
    e.target.checked ? map.addLayer(umkmLayer) : map.removeLayer(umkmLayer);
  });
  document.getElementById('chk-rt').addEventListener('change', e => {
    e.target.checked ? map.addLayer(rtLayer) : map.removeLayer(rtLayer);
  });
  document.getElementById('chk-rw').addEventListener('change', e => {
    e.target.checked ? map.addLayer(rwLayer) : map.removeLayer(rwLayer);
  });
</script>
</body>
</html>
